# Optional Agent Sandbox Runtime service.
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#       -f docker-compose.agent-runtime.yml up -d
# Reuses the monolith image; just runs the runtime entrypoint on its own port.
services:
  agent-runtime:
    container_name: agent-runtime
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "agent-runtime/server.js"]
    env_file:
      - .env
    environment:
      AGENT_RUNTIME_PORT: 3005
      SUPERSENDER_API_BASE: http://backend:3001
      NODE_ENV: production
    ports:
      - "3005:3005"
    restart: always
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3005/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }
    depends_on:
      - backend
