name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install (best-effort, no scripts)
        run: npm install --ignore-scripts --no-audit --no-fund || echo 'install skipped/partial - smoke tests are dependency-light'
      - name: Run smoke suite + doctors
        env:
          DB_DRIVER: json
          SALES_PIPELINE_DRY_RUN: 'true'
          ADMIN_ALERT_DRY_RUN: 'true'
          AUTH_JWT_SECRET: ci-test-secret
        run: node scripts/ci-smoke.js
