<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Customer Lifetime Value \u2014 SuperSender Pro</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0b141a;color:#e9edef;font-family:system-ui,sans-serif;padding:24px;max-width:1040px;margin:0 auto}a.back{display:inline-flex;gap:6px;background:rgba(255,255,255,.05);border:1px solid #2a3942;color:#8696a0;padding:7px 12px;border-radius:7px;text-decoration:none;font-size:12px;margin-bottom:16px}h1{font-size:22px;font-weight:800}.sub{color:#8696a0;font-size:13px;margin-bottom:18px}.banner{font-size:12px;padding:9px 12px;border-radius:9px;margin-bottom:14px;display:none}.banner.show{display:block;background:rgba(83,189,235,.08);border:1px solid rgba(83,189,235,.25);color:#9fd7f2}.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpi{background:#1f2c34;border:1px solid #2a3942;border-radius:12px;padding:14px}.kv{font-size:20px;font-weight:800;color:#00a884}.kl{font-size:10px;color:#8696a0;text-transform:uppercase;font-weight:700;margin-top:4px}.g2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px}.card{background:#1f2c34;border:1px solid #2a3942;border-radius:12px;padding:16px;margin-bottom:14px}.ct{font-size:10px;color:#8696a0;font-weight:700;text-transform:uppercase;margin-bottom:12px}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;padding:7px 8px;border-bottom:1px solid #2a3942;font-size:10px;color:#8696a0;text-transform:uppercase}td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.03)}.num{text-align:right}.dist .row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}.dist .lab{width:64px;color:#8696a0;text-align:right}.dist .bar{flex:1;height:18px;background:rgba(255,255,255,.05);border-radius:5px;overflow:hidden}.dist .bar>span{display:block;height:100%;background:linear-gradient(90deg,#00a884,#53bdeb)}.dist .c{width:36px;font-weight:600}.empty{color:#8696a0;text-align:center;padding:18px}@media(max-width:820px){.kpi-row{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}</style></head><body><a class="back" href="/founder-analytics.html">&larr; Analytics</a><h1>Customer Lifetime Value</h1><div class="sub">Projected 12-month value per customer. Sets your ceiling on acquisition cost.</div><div class="banner" id="banner"></div><div class="kpi-row"><div class="kpi"><div class="kv" id="kTotal">&mdash;</div><div class="kl">Predicted CLV (12mo)</div></div><div class="kpi"><div class="kv" id="kAvg">&mdash;</div><div class="kl">Avg per customer</div></div><div class="kpi"><div class="kv" id="kHist">&mdash;</div><div class="kl">Historical value</div></div><div class="kpi"><div class="kv" id="kTop">&mdash;</div><div class="kl">Top 10% share</div></div></div><div class="g2"><div class="card"><div class="ct">Highest predicted CLV \u2014 protect these</div><table><thead><tr><th>Customer</th><th class="num">Orders</th><th class="num">AOV</th><th class="num">Spent</th><th class="num">Predicted</th></tr></thead><tbody id="rows"></tbody></table></div><div class="card"><div class="ct">CLV distribution</div><div class="dist" id="dist"></div></div></div><script>(function(){var PKR=function(n){return 'PKR '+Number(n||0).toLocaleString();};var el=function(id){return document.getElementById(id);};var snap=null;async function load(){var t=[{u:'/clv/snapshot.json',pick:function(j){return j.primary||j;}},{u:'/api/clv/all',pick:function(j){return j.snapshot.primary||j.snapshot;},live:true}];for(var i=0;i<t.length;i++){try{var r=await fetch(t[i].u,{cache:'no-store'});if(!r.ok)continue;var j=await r.json();var s=t[i].pick(j);if(s&&s.topCustomers)return{snap:s,live:t[i].live};}catch(e){}}return null;}function render(){var s=snap.summary;el('kTotal').textContent=PKR(s.predictedCLVTotal);el('kAvg').textContent=PKR(s.avgPredictedCLV);el('kHist').textContent=PKR(s.historicalValueTotal);el('kTop').textContent=(s.top10Share||0)+'%';el('rows').innerHTML=(snap.topCustomers||[]).length?snap.topCustomers.map(function(c){return '<tr><td><b>'+(c.name||c.phone)+'</b></td><td class="num">'+c.orders+'</td><td class="num">'+PKR(c.aov)+'</td><td class="num">'+PKR(c.historicalValue)+'</td><td class="num"><b style="color:#00a884">'+PKR(c.predictedCLV)+'</b></td></tr>';}).join(''):'<tr><td colspan="5" class="empty">No CLV data yet. Run the batch on PC #2.</td></tr>';var dist=snap.distribution||[];var max=Math.max.apply(null,dist.map(function(d){return d.count;}).concat([1]));el('dist').innerHTML=dist.length?dist.map(function(d){return '<div class="row"><div class="lab">'+d.label+'</div><div class="bar"><span style="width:'+(d.count/max*100).toFixed(1)+'%"></span></div><div class="c">'+d.count+'</div></div>';}).join(''):'<div class="empty">No data</div>';}load().then(function(res){if(!res){el('banner').className='banner show';el('banner').textContent='No data. Run: node scripts/clv-batch.js on PC #2.';return;}snap=res.snap;if(res.live){el('banner').className='banner show';el('banner').textContent='Live data.';}render();});})();</script></body></html>
