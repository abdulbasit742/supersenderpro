<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>White Label Config - SuperSender Pro</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0b141a;color:#e9edef;font-family:system-ui,sans-serif;padding:24px}.hdr{display:flex;align-items:center;gap:12px;margin-bottom:24px}.back{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid #2a3942;color:#8696a0;padding:7px 12px;border-radius:7px;text-decoration:none;font-size:12px}.back:hover{border-color:#00a884;color:#00a884}h1{font-size:20px;font-weight:700}.sub{color:#8696a0;font-size:13px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}@media(max-width:700px){.grid{grid-template-columns:1fr}}.card{background:#1f2c34;border:1px solid #2a3942;border-radius:12px;padding:20px}.ct{font-size:11px;color:#8696a0;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px}.field{margin-bottom:13px}.field label{display:block;font-size:10px;font-weight:600;color:#8696a0;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}.field input,.field select{width:100%;padding:8px 11px;background:#111b21;border:1px solid #2a3942;border-radius:7px;color:#e9edef;font-size:13px;font-family:inherit}.field input:focus,.field select:focus{border-color:#00a884;outline:none}.cr{display:flex;align-items:center;gap:8px}.cr input[type=color]{width:40px;height:33px;padding:2px;border-radius:6px;cursor:pointer}.cr input[type=text]{flex:1}.prev{background:#111b21;border:1px solid #2a3942;border-radius:12px;padding:16px;margin-bottom:20px}.prev-b{display:flex;align-items:center;gap:10px;margin-bottom:8px}.prev-dot{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}.prev-n{font-size:16px;font-weight:700}.prev-t{font-size:12px;color:#8696a0}.tr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}.tl{font-size:13px;color:#d1d9de}.ts{font-size:11px;color:#8696a0;margin-top:2px}.sw{width:40px;height:22px;background:#2a3942;border-radius:11px;cursor:pointer;position:relative;transition:.2s;flex-shrink:0}.sw.on{background:#00a884}.sw::after{content:"";width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:.2s}.sw.on::after{left:21px}.save{background:#00a884;color:#fff;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;width:100%;max-width:320px;display:block;margin-top:4px}.save:hover{background:#00cf9d}.toast{position:fixed;bottom:20px;right:20px;background:#1f2c34;border:1px solid #2a3942;border-left:4px solid #00a884;border-radius:10px;padding:12px 18px;font-size:13px;display:none;z-index:999}</style></head><body><div class="hdr"><a href="/index.html" class="back">&#8592; Dashboard</a><div><h1>White Label Configuration</h1><p class="sub">Customize branding for reseller clients</p></div></div><div class="prev" id="preview"><div class="prev-b"><div class="prev-dot" id="pdot" style="background:linear-gradient(135deg,#00a884,#53bdeb)">S</div><div><div class="prev-n" id="pname">SuperSender Pro</div><div class="prev-t" id="ptag">AI Business Command Center</div></div></div><div style="font-size:11px;color:#8696a0">Live preview</div></div><div class="grid"><div class="card"><div class="ct">Brand Identity</div><div class="field"><label>Brand Name</label><input id="brandName" placeholder="SuperSender Pro" oninput="upPrev()"></div><div class="field"><label>Tagline</label><input id="tagline" placeholder="AI Business Command Center" oninput="upPrev()"></div><div class="field"><label>Logo URL</label><input id="logoUrl" placeholder="https://..."></div><div class="field"><label>Custom Domain</label><input id="customDomain" placeholder="app.yourcompany.com"></div><div class="field"><label>Primary Color</label><div class="cr"><input type="color" id="pc" value="#00a884" oninput="syncC(1)"><input type="text" id="primaryColor" value="#00a884" oninput="syncT(1)"></div></div><div class="field"><label>Secondary Color</label><div class="cr"><input type="color" id="sc" value="#53bdeb" oninput="syncC(2)"><input type="text" id="secondaryColor" value="#53bdeb" oninput="syncT(2)"></div></div></div><div class="card"><div class="ct">Contact & Support</div><div class="field"><label>Support WhatsApp</label><input id="supportWhatsapp" placeholder="923001234567"></div><div class="field"><label>Support Email</label><input id="supportEmail" placeholder="support@company.com"></div><div class="field"><label>Website</label><input id="website" placeholder="https://yoursite.com"></div><div class="field"><label>Custom Footer</label><input id="customFooter" placeholder="Powered by YourBrand"></div><div class="field"><label>Currency</label><select id="currency"><option value="PKR">PKR</option><option value="USD">USD</option><option value="AED">AED</option><option value="GBP">GBP</option></select></div><div class="tr" style="margin-top:12px"><div><div class="tl">Hide Built on SuperSender Pro</div><div class="ts">Show your own brand only</div></div><div class="sw" id="hbb" onclick="togHBB()"></div></div></div></div><button class="save" onclick="save()">Save White Label Config</button><div class="toast" id="toast"></div><script>let hbb=false;function upPrev(){document.getElementById("pname").textContent=document.getElementById("brandName").value||"SuperSender Pro";document.getElementById("ptag").textContent=document.getElementById("tagline").value||"AI Business Command Center";const c1=document.getElementById("primaryColor").value||"#00a884";const c2=document.getElementById("secondaryColor").value||"#53bdeb";document.getElementById("pdot").style.background="linear-gradient(135deg,"+c1+","+c2+")";}function syncC(w){const p=document.getElementById(w===1?"pc":"sc");const t=document.getElementById(w===1?"primaryColor":"secondaryColor");t.value=p.value;upPrev();}function syncT(w){const t=document.getElementById(w===1?"primaryColor":"secondaryColor");const p=document.getElementById(w===1?"pc":"sc");if(/^#[0-9a-fA-F]{6}$/.test(t.value))p.value=t.value;upPrev();}function togHBB(){hbb=!hbb;document.getElementById("hbb").className="sw"+(hbb?" on":"");}function toast(m,t){const e=document.getElementById("toast");e.textContent=m;e.style.borderLeftColor=t==="error"?"#ef4444":"#00a884";e.style.display="block";setTimeout(()=>e.style.display="none",2800);}async function save(){const b=document.querySelector(".save");b.textContent="Saving...";b.disabled=true;try{const body={brandName:document.getElementById("brandName").value,tagline:document.getElementById("tagline").value,logoUrl:document.getElementById("logoUrl").value,customDomain:document.getElementById("customDomain").value,primaryColor:document.getElementById("primaryColor").value,secondaryColor:document.getElementById("secondaryColor").value,supportWhatsapp:document.getElementById("supportWhatsapp").value,supportEmail:document.getElementById("supportEmail").value,customFooter:document.getElementById("customFooter").value,hideBuiltBy:hbb,currency:document.getElementById("currency").value,socialLinks:{website:document.getElementById("website").value}};const r=await fetch("/api/white-label/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});const d=await r.json();if(d.ok)toast("Config saved!");else toast("Error: "+(d.error||"Unknown"),"error");}catch(e){toast("Save failed: "+e.message,"error");}b.textContent="Save White Label Config";b.disabled=false;}fetch("/api/white-label/config").then(r=>r.json()).then(d=>{if(!d.ok||!d.config)return;const c=d.config;["brandName","tagline","logoUrl","customDomain","primaryColor","secondaryColor","supportWhatsapp","supportEmail","customFooter"].forEach(k=>{const el=document.getElementById(k);if(el&&c[k])el.value=c[k];});if(c.currency)document.getElementById("currency").value=c.currency;if(c.primaryColor){document.getElementById("pc").value=c.primaryColor;}if(c.secondaryColor){document.getElementById("sc").value=c.secondaryColor;}if(c.socialLinks?.website)document.getElementById("website").value=c.socialLinks.website;if(c.hideBuiltBy){hbb=true;document.getElementById("hbb").className="sw on";}upPrev();}).catch(()=>{});</script></body></html>
