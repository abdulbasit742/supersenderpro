  <!DOCTYPE html>
  <html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Portal</title><link rel="stylesheet" href="/css/customer-portal.css" /></head>
  <body>
    <header class="cp-header"><h1>Self-Service Status Center</h1><span id="cp-badge" class="cp-badge">loading…</span>
  </header>
    <section class="cp-pick"><label>Customer (demo preview token)</label><select id="cp-customer"></select><button id="cp-
  load">Preview status</button></section>
    <main class="cp-main">
      <div id="cp-loading" class="cp-state" hidden>Loading status preview…</div>
      <div id="cp-empty" class="cp-state" hidden>Pick a customer to preview their status.</div>
      <div id="cp-error" class="cp-state cp-err" hidden>Couldn't load status. Try again.</div>
      <section id="cp-summary" class="cp-summary" hidden></section>
      <section id="cp-areas" class="cp-areas" hidden></section>
      <section class="cp-actions" id="cp-actions" hidden>
        <div class="cp-card"><h3>Support request</h3><input id="sr-subject" placeholder="subject" /><textarea id="sr-body"
  placeholder="describe your issue"></textarea><button id="sr-preview">Preview request</button><pre id="sr-out"></pre>
  </div>
        <div class="cp-card"><h3>Message</h3><textarea id="msg-text" placeholder="message text"></textarea><button id="msg-
  draft">Draft message</button><pre id="msg-out"></pre></div>
      </section>
    </main>
    <script src="/js/customer-portal.js"></script>
  </body></html>
