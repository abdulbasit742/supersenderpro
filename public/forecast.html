<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Revenue Forecast — SuperSender Pro</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0b141a;color:#e9edef;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:24px;max-width:1080px;margin:0 auto}
  a.back{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid #2a3942;color:#8696a0;padding:7px 12px;border-radius:7px;text-decoration:none;font-size:12px;margin-bottom:16px}
  a.back:hover{border-color:#00a884;color:#00a884}
  h1{font-size:22px;font-weight:800;margin-bottom:2px}
  .sub{color:#8696a0;font-size:13px;margin-bottom:18px}
  .banner{font-size:12px;padding:9px 12px;border-radius:9px;margin-bottom:14px;display:none}
  .banner.show{display:block;background:rgba(83,189,235,.08);border:1px solid rgba(83,189,235,.25);color:#9fd7f2}
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .kpi{background:#1f2c34;border:1px solid #2a3942;border-radius:12px;padding:14px;position:relative;overflow:hidden}
  .kpi::after{content:"";position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#00a884,#53bdeb)}
  .kv{font-size:22px;font-weight:800;color:#00a884;line-height:1.1}
  .kl{font-size:10px;color:#8696a0;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-top:4px}
  .kd{font-size:11px;color:#8696a0;margin-top:4px}
  .kd.up{color:#00a884}.kd.down{color:#ef4444}
  .card{background:#1f2c34;border:1px solid #2a3942;border-radius:12px;padding:16px;margin-bottom:14px}
  .ct{font-size:10px;color:#8696a0;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
  .legend{display:flex;gap:16px;font-size:11px;color:#8696a0;margin-top:10px;flex-wrap:wrap}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;text-align:center}
  .dow .d{background:#0b141a;border:1px solid #2a3942;border-radius:8px;padding:8px 4px}
  .dow .dv{font-size:15px;font-weight:800;color:#53bdeb}
  .dow .dl{font-size:10px;color:#8696a0;margin-top:2px}
  .empty{color:#8696a0;text-align:center;padding:18px;font-size:13px}
  svg text{fill:#8696a0;font-size:10px}
</style>
</head>
<body>
  <a class="back" href="/founder-analytics.html">&larr; Analytics</a>
  <h1>Revenue &amp; Demand Forecast</h1>
  <div class="sub">Where revenue is heading over the next 30 days, with best/worst case.</div>
  <div class="banner" id="banner"></div>

  <div class="kpi-row">
    <div class="kpi"><div class="kv" id="kFc">&mdash;</div><div class="kl">Next 30d forecast</div><div class="kd" id="kFcD"></div></div>
    <div class="kpi"><div class="kv" id="kRange">&mdash;</div><div class="kl">Range (95%)</div></div>
    <div class="kpi"><div class="kv" id="kOrders">&mdash;</div><div class="kl">Next 30d orders</div></div>
    <div class="kpi"><div class="kv" id="kAcc">&mdash;</div><div class="kl">Backtest accuracy</div></div>
  </div>

  <div class="card">
    <div class="ct">Actual (60d) &rarr; Forecast (30d) with confidence band</div>
    <div id="chart"></div>
    <div class="legend">
      <span><span class="dot" style="background:#53bdeb"></span>Actual</span>
      <span><span class="dot" style="background:#00a884"></span>Forecast</span>
      <span><span class="dot" style="background:rgba(0,168,132,.25)"></span>95% band</span>
    </div>
  </div>

  <div class="card">
    <div class="ct">Day-of-week pattern (1.0 = average day)</div>
    <div class="dow" id="dow"></div>
  </div>

<script>
(function(){
  var PKR=function(n){return 'PKR '+Number(n||0).toLocaleString();};
  var el=function(id){return document.getElementById(id);};
  var DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var snap=null;

  async function loadData(){
    var tries=[{u:'/forecast/snapshot.json',pick:function(j){return j.primary||j;}},{u:'/api/forecast/all',pick:function(j){return j.snapshot.primary||j.snapshot;},live:true}];
    for(var i=0;i<tries.length;i++){
      try{ var r=await fetch(tries[i].u,{cache:'no-store'}); if(!r.ok) continue; var j=await r.json(); var s=tries[i].pick(j); if(s&&s.forecast){ return {snap:s,live:tries[i].live}; } }catch(e){}
    }
    return null;
  }

  function chart(){
    var act=(snap.actuals.revenue||[]);
    var fc=(snap.forecast.revenue||[]);
    if(!act.length&&!fc.length){ el('chart').innerHTML='<div class="empty">No data yet. Run the batch on PC #2.</div>'; return; }
    var w=720,h=240,pad=38;
    var all=act.map(function(p){return p.value;}).concat(fc.map(function(p){return p.upper;}));
    var maxV=Math.max.apply(null,all.concat([1]));
    var n=act.length+fc.length;
    var stepX=n>1?(w-pad*2)/(n-1):0;
    var X=function(i){return pad+i*stepX;};
    var Y=function(v){return h-pad-(v/maxV)*(h-pad*2);};

    // Actual line.
    var aPath=act.map(function(p,i){return (i?'L':'M')+X(i).toFixed(1)+' '+Y(p.value).toFixed(1);}).join(' ');
    // Forecast line (continues from last actual).
    var startI=act.length-1;
    var fcPts=[{forecast:act.length?act[act.length-1].value:0}].concat(fc);
    var fPath=fcPts.map(function(p,i){return (i?'L':'M')+X(startI+i).toFixed(1)+' '+Y(p.forecast).toFixed(1);}).join(' ');
    // Confidence band polygon.
    var up=fc.map(function(p,i){return X(act.length+i).toFixed(1)+' '+Y(p.upper).toFixed(1);});
    var lo=fc.map(function(p,i){return X(act.length+i).toFixed(1)+' '+Y(p.lower).toFixed(1);}).reverse();
    var band=fc.length?('M'+up.join(' L ')+' L '+lo.join(' L ')+' Z'):'';

    var divider=act.length?('<line x1="'+X(startI).toFixed(1)+'" y1="'+pad+'" x2="'+X(startI).toFixed(1)+'" y2="'+(h-pad)+'" stroke="#2a3942" stroke-dasharray="3 3"/>'):'';
    el('chart').innerHTML='<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="240">'
      +(band?'<path d="'+band+'" fill="rgba(0,168,132,.18)"/>':'')
      +divider
      +'<path d="'+aPath+'" fill="none" stroke="#53bdeb" stroke-width="2"/>'
      +'<path d="'+fPath+'" fill="none" stroke="#00a884" stroke-width="2" stroke-dasharray="5 3"/>'
      +'<text x="'+pad+'" y="14">'+PKR(maxV)+'</text>'
      +'<text x="'+pad+'" y="'+(h-6)+'">60d ago</text>'
      +'<text x="'+X(startI).toFixed(1)+'" y="'+(h-6)+'" text-anchor="middle">today</text>'
      +'<text x="'+(w-pad)+'" y="'+(h-6)+'" text-anchor="end">+30d</text>'
      +'</svg>';
  }

  function dow(){
    var s=snap.summary.seasonality||[];
    if(!s.length){ el('dow').innerHTML='<div class="empty">No pattern yet</div>'; return; }
    el('dow').innerHTML=s.map(function(v,i){return '<div class="d"><div class="dv">'+Number(v).toFixed(2)+'</div><div class="dl">'+DOW[i]+'</div></div>';}).join('');
  }

  loadData().then(function(res){
    if(!res){ el('banner').className='banner show'; el('banner').textContent='No forecast yet. Run: node scripts/forecast-batch.js on PC #2.'; return; }
    snap=res.snap;
    if(res.live){ el('banner').className='banner show'; el('banner').textContent='Live data (computed on request).'; }
    var sm=snap.summary;
    el('kFc').textContent=PKR(sm.next30Revenue);
    el('kFcD').innerHTML=sm.projectedGrowthPct==null?('vs '+PKR(sm.trailing30Revenue)+' last 30d'):
      '<span class="'+(sm.projectedGrowthPct>=0?'up':'down')+'">'+(sm.projectedGrowthPct>=0?'\u25B2 +':'\u25BC ')+sm.projectedGrowthPct+'% vs last 30d</span>';
    el('kRange').textContent=PKR(sm.next30RevenueLow)+' \u2013 '+PKR(sm.next30RevenueHigh);
    el('kOrders').textContent=sm.next30Orders;
    el('kAcc').textContent=sm.backtestAccuracyPct==null?'\u2014':sm.backtestAccuracyPct+'%';
    chart(); dow();
  });
})();
</script>
</body>
</html>
