<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Cohort Retention \u2014 SuperSender Pro</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0b141a;color:#e9edef;font-family:system-ui,sans-serif;padding:24px;max-width:1180px;margin:0 auto}a.back{display:inline-flex;gap:6px;background:rgba(255,255,255,.05);border:1px solid #2a3942;color:#8696a0;padding:7px 12px;border-radius:7px;text-decoration:none;font-size:12px;margin-bottom:16px}h1{font-size:22px;font-weight:800}.sub{color:#8696a0;font-size:13px;margin-bottom:18px}.banner{font-size:12px;padding:9px 12px;border-radius:9px;margin-bottom:14px;display:none}.banner.show{display:block;background:rgba(83,189,235,.08);border:1px solid rgba(83,189,235,.25);color:#9fd7f2}.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpi{background:#1f2c34;border:1px solid #2a3942;border-radius:12px;padding:14px}.kv{font-size:22px;font-weight:800;color:#00a884}.kv.warn{color:#f59e0b}.kl{font-size:10px;color:#8696a0;text-transform:uppercase;font-weight:700;margin-top:4px}.card{background:#1f2c34;border:1px solid #2a3942;border-radius:12px;padding:16px;overflow-x:auto}.ct{font-size:10px;color:#8696a0;font-weight:700;text-transform:uppercase;margin-bottom:12px}table{border-collapse:collapse;font-size:11px}th{padding:6px 8px;color:#8696a0;font-weight:600;font-size:9px}td{padding:0;text-align:center}.cohort-lbl{text-align:left;font-weight:600;white-space:nowrap;padding-right:10px}.size{color:#8696a0;font-weight:400;font-size:10px}.cell{width:50px;height:32px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#04231b;margin:2px}.cell.empty{background:transparent;color:#3a4a52;font-weight:400}.empty{color:#8696a0;text-align:center;padding:18px}</style></head><body><a class="back" href="/founder-analytics.html">&larr; Analytics</a><h1>Cohort Retention &amp; LTV</h1><div class="sub">Group customers by signup month. Are newer cohorts stickier?</div><div class="banner" id="banner"></div><div class="kpi-row"><div class="kpi"><div class="kv" id="kCo">&mdash;</div><div class="kl">Cohorts</div></div><div class="kpi"><div class="kv" id="kM1">&mdash;</div><div class="kl">Avg M1 retention</div></div><div class="kpi"><div class="kv" id="kM3">&mdash;</div><div class="kl">Avg M3 retention</div></div><div class="kpi"><div class="kv" id="kTrend">&mdash;</div><div class="kl">M1 trend</div></div></div><div class="card"><div class="ct">Retention heatmap \u2014 % still ordering, by month since signup</div><table id="heat"><thead id="heatHead"></thead><tbody id="heatBody"></tbody></table></div><script>(function(){var el=function(id){return document.getElementById(id);};var snap=null;async function load(){var t=[{u:'/cohorts/snapshot.json',pick:function(j){return j.primary||j;}},{u:'/api/cohorts/all',pick:function(j){return j.snapshot.primary||j.snapshot;},live:true}];for(var i=0;i<t.length;i++){try{var r=await fetch(t[i].u,{cache:'no-store'});if(!r.ok)continue;var j=await r.json();var s=t[i].pick(j);if(s&&s.cohorts)return{snap:s,live:t[i].live};}catch(e){}}return null;}function color(p){if(p==null)return 'transparent';var st=[[0,'#3a1d1d'],[25,'#7a4a1a'],[50,'#b8901f'],[75,'#5fae6e'],[100,'#00a884']];for(var i=st.length-1;i>=0;i--)if(p>=st[i][0])return st[i][1];return st[0][1];}function render(){el('kCo').textContent=snap.summary.cohorts;el('kM1').textContent=snap.summary.avgM1RetentionPct==null?'\u2014':snap.summary.avgM1RetentionPct+'%';el('kM3').textContent=snap.summary.avgM3RetentionPct==null?'\u2014':snap.summary.avgM3RetentionPct+'%';var t=snap.summary.m1RetentionTrendPct;var te=el('kTrend');if(t==null){te.textContent='\u2014';}else{te.textContent=(t>=0?'\u25B2 +':'\u25BC ')+t+'%';if(t<0)te.className='kv warn';}var maxM=Math.min(snap.summary.maxMonthsTracked||0,12);var head='<tr><th class="cohort-lbl">Cohort</th>';for(var m=0;m<=maxM;m++)head+='<th>M'+m+'</th>';head+='</tr>';el('heatHead').innerHTML=head;var rows=(snap.cohorts||[]);if(!rows.length){el('heatBody').innerHTML='<tr><td class="empty" colspan="'+(maxM+2)+'">No cohorts yet. Run the batch on PC #2.</td></tr>';return;}el('heatBody').innerHTML=rows.map(function(c){var tds='<td class="cohort-lbl">'+c.cohort+' <span class="size">(n='+c.size+')</span></td>';for(var m=0;m<=maxM;m++){var r=c.retention[m];if(r)tds+='<td><div class="cell" style="background:'+color(r.pct)+'">'+Math.round(r.pct)+'</div></td>';else tds+='<td><div class="cell empty">\u00b7</div></td>';}return '<tr>'+tds+'</tr>';}).join('');}load().then(function(res){if(!res){el('banner').className='banner show';el('banner').textContent='No data. Run: node scripts/cohorts-batch.js on PC #2.';return;}snap=res.snap;if(res.live){el('banner').className='banner show';el('banner').textContent='Live data.';}render();});})();</script></body></html>
