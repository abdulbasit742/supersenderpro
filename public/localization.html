  <header><h1>   Localization & Business Config</h1></header>
  <main>
    <div class="card"><h2>Configure a business</h2>
      <label>Business ID</label><input id="id" placeholder="e.g. my-shop" />
      <label>Business name</label><input id="name" placeholder="My Shop" />
      <label>Country</label><select id="country"></select>
      <label>Business type</label><input id="type" placeholder="ecommerce_store / education / real_estate ..." />
      <label>Language override (optional)</label><select id="locale"><option value="">(use country default)</option>
  </select>
      <button id="save">Save & resolve config</button>
    </div>
    <div class="card"><h2>Resolved config</h2><pre id="out">Save a business to preview its resolved settings.</pre></div>
  </main>
  <script>(function(){
    function esc(v){return String(v==null?'':v);}
    fetch('/api/localization/countries').then(function(r){return r.json();}).then(function(d){
      document.getElementById('country').innerHTML=(d.countries||[]).map(function(c){return '<option
  value="'+c.code+'">'+esc(c.name)+' ('+c.currency+')</option>';}).join('');
    });
    fetch('/api/localization/status').then(function(r){return r.json();}).then(function(d){
      var ls=(d&&d.locales)||[]; var sel=document.getElementById('locale');
      ls.forEach(function(l){var o=document.createElement('option');o.value=l;o.textContent=l;sel.appendChild(o);});
    });
    document.getElementById('save').addEventListener('click',function(){
      fetch('/api/localization/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        id:document.getElementById('id').value,name:document.getElementById('name').value,
        country:document.getElementById('country').value,type:document.getElementById('type').value,
        locale:document.getElementById('locale').value||undefined
      })}).then(function(r){return r.json();}).then(function(d)
  {document.getElementById('out').textContent=JSON.stringify(d.config||d,null,2);});
    });
  })();</script></body></html>
