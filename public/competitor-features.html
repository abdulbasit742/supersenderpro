<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SuperSender Pro — Competitor Features Control Center</title>
<style>
  :root{--bg:#071014;--panel:#122029;--line:#263946;--text:#eaf7f3;--muted:#8da3ad;--accent:#18c29c;--danger:#fb7185;--warn:#f59e0b}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;min-height:100vh}
  .wrap{max-width:1240px;margin:0 auto;padding:24px}
  .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  h1{margin:0;font-size:24px}
  .muted{color:var(--muted)}
  .badge{background:var(--accent);color:#04221b;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .card h3{margin:0 0 4px;font-size:15px}
  .card .sub{color:var(--muted);font-size:12px;margin-bottom:12px}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 3px}
  input,textarea,select{width:100%;background:#0a1820;border:1px solid var(--line);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px}
  textarea{min-height:54px;resize:vertical}
  button{margin-top:12px;width:100%;background:var(--accent);color:#04221b;border:none;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;font-size:13px}
  button:hover{filter:brightness(1.08)}
  pre{background:#04141a;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:11.5px;overflow:auto;max-height:220px;margin-top:10px;white-space:pre-wrap;word-break:break-word}
  .ok{color:var(--accent)} .err{color:var(--danger)}
  .cat{grid-column:1/-1;margin:18px 0 -2px;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);font-weight:700;border-bottom:1px solid var(--line);padding-bottom:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>⚡ Competitor Features Control Center</h1>
      <p class="muted">All premium competitor &amp; algorithm features — live and ready to use.</p>
    </div>
    <span class="badge" id="hostBadge">API: same origin</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script src="competitor-features.js"></script>
</body>
</html>
