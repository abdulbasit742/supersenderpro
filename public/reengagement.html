<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Win-Back \u2014 SuperSender Pro</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0b141a;color:#e9edef;font-family:system-ui,sans-serif;padding:24px;max-width:1080px;margin:0 auto}a.back{display:inline-flex;gap:6px;background:rgba(255,255,255,.05);border:1px solid #2a3942;color:#8696a0;padding:7px 12px;border-radius:7px;text-decoration:none;font-size:12px;margin-bottom:16px}h1{font-size:22px;font-weight:800}.sub{color:#8696a0;font-size:13px;margin-bottom:18px}.banner{font-size:12px;padding:9px 12px;border-radius:9px;margin-bottom:14px;background:rgba(83,189,235,.08);border:1px solid rgba(83,189,235,.25);color:#9fd7f2}.banner.live{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#f3b0b0}.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpi{background:#1f2c34;border:1px solid #2a3942;border-radius:12px;padding:14px}.kv{font-size:22px;font-weight:800;color:#00a884}.kl{font-size:10px;color:#8696a0;text-transform:uppercase;font-weight:700;margin-top:4px}.bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}button{background:#00a884;color:#04231b;border:0;font-weight:700;padding:9px 16px;border-radius:8px;cursor:pointer;font-size:13px}button.ghost{background:rgba(255,255,255,.05);color:#e9edef;border:1px solid #2a3942}button:disabled{opacity:.5}.card{background:#1f2c34;border:1px solid #2a3942;border-radius:12px;padding:16px}.ct{font-size:10px;color:#8696a0;font-weight:700;text-transform:uppercase;margin-bottom:12px}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;padding:7px 8px;border-bottom:1px solid #2a3942;font-size:10px;color:#8696a0;text-transform:uppercase}td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:top}.num{text-align:right}.tg{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}.tg-r{background:rgba(239,68,68,.14);color:#ef4444}.tg-y{background:rgba(245,158,11,.14);color:#f59e0b}.msg{color:#cfe9e0;background:rgba(0,168,132,.06);border:1px solid rgba(0,168,132,.15);border-radius:8px;padding:8px 10px;font-size:12px;max-width:420px}.why{color:#8696a0;font-size:11px}.empty{color:#8696a0;text-align:center;padding:18px}</style></head><body><a class="back" href="/founder-analytics.html">&larr; Analytics</a><h1>Win-Back Campaigns</h1><div class="sub">Acts on the churn brain: re-engages high-value customers slipping away.</div><div class="banner" id="banner"></div><div class="kpi-row"><div class="kpi"><div class="kv" id="kTarget">&mdash;</div><div class="kl">Targeted today</div></div><div class="kpi"><div class="kv" id="kRisk">&mdash;</div><div class="kl">Revenue at risk</div></div><div class="kpi"><div class="kv" id="kSkip">&mdash;</div><div class="kl">Skipped (safety)</div></div><div class="kpi"><div class="kv" id="kCap">&mdash;</div><div class="kl">Daily cap left</div></div></div><div class="bar"><button id="btnPlan" class="ghost">Refresh plan</button><button id="btnExec" disabled>Execute</button><span id="status" style="color:#8696a0;font-size:12px"></span></div><div class="card"><div class="ct">Who we'd reach out to \u2014 highest revenue-at-risk first</div><table><thead><tr><th>Customer</th><th class="num">Risk</th><th class="num">At risk</th><th>Message</th></tr></thead><tbody id="rows"></tbody></table></div><script>(function(){var PKR=function(n){return 'PKR '+Number(n||0).toLocaleString();};var el=function(id){return document.getElementById(id);};var cur=null;function mask(p){var s=String(p||'');return s.length>5?s.slice(0,4)+'****'+s.slice(-2):'****';}function tag(b){return '<span class="tg '+(b==='high'?'tg-r':'tg-y')+'">'+b+'</span>';}function render(c){cur=c;var b=el('banner');if(c.mode==='live'){b.className='banner live';b.innerHTML='<b>LIVE.</b> Execute will queue real follow-ups.';}else{b.innerHTML='<b>Dry-run.</b> Execute previews only. Set REENGAGE_LIVE=true on PC #2 to go live.';}el('kTarget').textContent=c.summary.targeted;el('kRisk').textContent=PKR(c.summary.revenueAtRiskTargeted);el('kSkip').textContent=c.summary.skipped;el('kCap').textContent=Math.max(0,(c.summary.dailyCap||0)-(c.summary.sentToday||0));el('btnExec').disabled=c.summary.targeted===0;el('btnExec').textContent=c.mode==='live'?('Queue '+c.summary.targeted):('Preview '+c.summary.targeted);el('rows').innerHTML=(c.targets||[]).map(function(t){return '<tr><td><b>'+(t.name||mask(t.phone))+'</b><br><span class="why">'+mask(t.phone)+' \u00b7 '+t.recencyDays+'d quiet</span></td><td class="num">'+tag(t.band)+' '+t.churnRisk+'</td><td class="num">'+PKR(t.revenueAtRisk)+'</td><td><div class="msg">'+t.message.replace(/</g,'&lt;')+'</div></td></tr>';}).join('')||'<tr><td colspan="4" class="empty">Nobody to win back \uD83C\uDF89</td></tr>';}async function plan(){el('status').textContent='Planning\u2026';try{var r=await fetch('/api/reengage/plan',{cache:'no-store'});var j=await r.json();if(!j.success)throw new Error(j.error);render(j.campaign);el('status').textContent='Plan ready';}catch(e){el('status').textContent='Could not plan: '+e.message;}}async function exec(){if(!cur)return;el('btnExec').disabled=true;try{var r=await fetch('/api/reengage/campaigns/'+cur.id+'/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});var j=await r.json();var c=j.campaign;el('status').textContent=c.status==='queued'?('Queued '+c.queuedCount+' \u2705'):'Previewed (dry-run)';}catch(e){el('status').textContent='Failed: '+e.message;el('btnExec').disabled=false;}}el('btnPlan').onclick=plan;el('btnExec').onclick=exec;plan();})();</script></body></html>
