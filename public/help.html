<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Help Center</title><link rel="stylesheet" href="/css/help.css" /></head>
<body>
  <header class="help-header"><h1>SuperSender Pro Help Center</h1></header>
  <main>
    <section><h2>Getting started</h2><div id="faq-list">Loading…</div></section>
    <section><h2>Contact support</h2>
      <form id="contact-form">
        <input id="c-name" placeholder="Your name" />
        <input id="c-title" placeholder="Subject" />
        <textarea id="c-desc" placeholder="How can we help?"></textarea>
        <label class="consent"><input type="checkbox" id="c-consent" /> I agree to be contacted about this request.
</label>
        <button type="submit">Submit (draft)</button>
      </form>
      <p id="contact-result" class="muted"></p>
    </section>
  </main>
  <script src="/js/help.js"></script>
</body></html>
