<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Analytics - SuperSender Pro</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0b141a;color:#e9edef;font-family:system-ui,sans-serif;padding:24px}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{color:#8696a0;font-size:13px;margin-bottom:20px}.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}@media(max-width:700px){.kpi-row{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr!important}}.kpi{background:#1f2c34;border:1px solid #2a3942;border-radius:12px;padding:16px;position:relative;overflow:hidden}.kpi::after{content:"";position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#00a884,#53bdeb)}.kv{font-size:26px;font-weight:800;color:#00a884;line-height:1;margin-bottom:4px}.kl{font-size:10px;color:#8696a0;text-transform:uppercase;letter-spacing:.6px;font-weight:700}.kd{font-size:11px;color:#8696a0;margin-top:4px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}.card{background:#1f2c34;border:1px solid #2a3942;border-radius:12px;padding:16px}.ct{font-size:10px;color:#8696a0;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}.cw{height:200px;position:relative}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;padding:7px 8px;border-bottom:1px solid #2a3942;font-size:10px;font-weight:700;color:#8696a0;text-transform:uppercase}td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.03)}tr:hover td{background:rgba(0,168,132,.04)}.tg{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}.tg-g{background:rgba(0,168,132,.15);color:#00a884}.tg-y{background:rgba(245,158,11,.12);color:#f59e0b}.tg-r{background:rgba(239,68,68,.12);color:#ef4444}.back{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid #2a3942;color:#8696a0;padding:7px 12px;border-radius:7px;text-decoration:none;font-size:12px;margin-bottom:16px}.back:hover{border-color:#00a884;color:#00a884}.empty{color:#8696a0;text-align:center;padding:20px;font-size:13px}</style></head><body><a href="/index.html" class="back">&#8592; Dashboard</a><h1>Analytics</h1><p class="sub" id="lu">Loading...</p><div class="kpi-row"><div class="kpi"><div class="kv" id="k1">-</div><div class="kl">Revenue</div><div class="kd" id="k1d">-</div></div><div class="kpi"><div class="kv" id="k2">-</div><div class="kl">Orders</div><div class="kd" id="k2d">-</div></div><div class="kpi"><div class="kv" id="k3">-</div><div class="kl">Customers</div><div class="kd" id="k3d">-</div></div><div class="kpi"><div class="kv" id="k4">-</div><div class="kl">WA Messages</div><div class="kd" id="k4d">-</div></div></div><div class="g2"><div class="card"><div class="ct">Revenue Last 7 Days</div><div class="cw"><canvas id="rc"></canvas></div></div><div class="card"><div class="ct">Orders by Status</div><div class="cw"><canvas id="oc"></canvas></div></div></div><div class="g2"><div class="card"><div class="ct">Recent Orders</div><div id="ot"><p class="empty">Loading...</p></div></div><div class="card"><div class="ct">Active Plans</div><div id="pt"><p class="empty">Loading...</p></div></div></div><script>let rc,oc;function fmt(n){return Number(n||0).toLocaleString();}function days7(){const a=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(d.toLocaleDateString("en",{month:"short",day:"numeric"}));}return a;}async function load(){try{const[sr,or,pr]=await Promise.all([fetch("/api/dashboard").catch(()=>null),fetch("/api/orders?limit=8").catch(()=>null),fetch("/api/saas-billing/plans").catch(()=>null)]);let s={},os=[],ps=[];if(sr&&sr.ok)s=await sr.json().catch(()=>({}));if(or&&or.ok){const d=await or.json().catch(()=>[]);os=Array.isArray(d)?d:(d.orders||d.data||[]);}if(pr&&pr.ok){const d=await pr.json().catch(()=>[]);ps=Array.isArray(d)?d:(d.plans||d.data||[]);}const rev=s.totalRevenue||s.revenue||os.reduce((a,o)=>a+Number(o.amount||o.total||0),0);const oc2=s.totalOrders||s.orders||os.length;const cc=s.totalCustomers||s.customers||0;const wc=s.whatsappMessages||s.messages||0;document.getElementById("k1").textContent="PKR "+fmt(rev);document.getElementById("k2").textContent=fmt(oc2);document.getElementById("k3").textContent=fmt(cc);document.getElementById("k4").textContent=fmt(wc);document.getElementById("k1d").textContent=rev>0?"Lifetime revenue":"No revenue yet";document.getElementById("k2d").textContent=oc2>0?oc2+" total":"No orders yet";document.getElementById("k3d").textContent=cc>0?cc+" registered":"No customers yet";document.getElementById("k4d").textContent=wc>0?wc+" sent":"Not tracked";document.getElementById("lu").textContent="Updated: "+new Date().toLocaleTimeString();const labs=days7();const chunk=rev>0?Math.round(rev/7):0;const rd=labs.map((_,i)=>i===6?Math.max(0,rev-chunk*6):chunk);const ctx1=document.getElementById("rc").getContext("2d");if(rc)rc.destroy();rc=new Chart(ctx1,{type:"line",data:{labels:labs,datasets:[{label:"PKR",data:rd,borderColor:"#00a884",backgroundColor:"rgba(0,168,132,.08)",fill:true,tension:.4,pointBackgroundColor:"#00a884",pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#8696a0",font:{size:10}}},y:{grid:{color:"rgba(255,255,255,.04)"},ticks:{color:"#8696a0",font:{size:10},callback:v=>"PKR "+fmt(v)}}}}});const sm={};os.forEach(o=>{const st=o.status||"pending";sm[st]=(sm[st]||0)+1;});if(!Object.keys(sm).length)sm["no orders"]=1;const ctx2=document.getElementById("oc").getContext("2d");if(oc)oc.destroy();oc=new Chart(ctx2,{type:"doughnut",data:{labels:Object.keys(sm),datasets:[{data:Object.values(sm),backgroundColor:["#00a884","#53bdeb","#f59e0b","#ef4444","#7c3aed"],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{color:"#8696a0",font:{size:10},boxWidth:10}}}}});if(os.length){let h="<table><thead><tr><th>ID</th><th>Customer</th><th>Amount</th><th>Status</th></tr></thead><tbody>";os.slice(0,8).forEach(o=>{const st=o.status||"pending";const cls=st==="paid"||st==="completed"?"tg-g":st==="pending"?"tg-y":"tg-r";h+="<tr><td style=font-family:monospace;color:#53bdeb;font-size:11px>"+(o.id||"-").toString().slice(0,10)+"</td><td>"+(o.customerName||o.customer_name||"-")+"</td><td style=color:#00a884;font-weight:600>PKR "+fmt(o.amount||o.total||0)+"</td><td><span class=tg "+cls+">"+st+"</span></td></tr>";});h+="</tbody></table>";document.getElementById("ot").innerHTML=h;}else{document.getElementById("ot").innerHTML="<p class=empty>No orders yet</p>";}const ap=ps.filter(p=>p.isActive!==false).slice(0,6);if(ap.length){let h="<table><thead><tr><th>Plan</th><th>Price</th><th>Status</th></tr></thead><tbody>";ap.forEach(p=>{h+="<tr><td style=font-weight:600>"+(p.name||p.id||"-")+"</td><td style=color:#00a884>PKR "+fmt(p.price||0)+"</td><td><span class=tg tg-g>Active</span></td></tr>";});h+="</tbody></table>";document.getElementById("pt").innerHTML=h;}else{document.getElementById("pt").innerHTML="<p class=empty>No plan data</p>";}}catch(e){document.getElementById("lu").textContent="Error: "+e.message;}}load();setInterval(load,60000);</script></body></html>
