<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Payment Confirmed - SuperSender Pro</title><style>*{box-sizing:border-box}body{background:#0b141a;color:#e9edef;font-family:system-ui,sans-serif;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card{background:#1f2c34;border:1px solid #2a3942;border-radius:16px;padding:40px 32px;max-width:480px;width:100%;text-align:center}.ico{width:80px;height:80px;background:rgba(0,168,132,.15);border:3px solid #00a884;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 24px}h1{color:#00a884;font-size:22px;margin:0 0 8px}.sub{color:#8696a0;font-size:14px;margin-bottom:24px}.detail{background:#111b21;border-radius:10px;padding:16px;text-align:left;margin-bottom:20px}.dr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}.dr:last-child{border:none}.dk{color:#8696a0}.dv{font-weight:600}.btn{display:block;padding:12px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;text-decoration:none;text-align:center;margin-bottom:8px;width:100%}.btn-p{background:#00a884;color:#fff}.btn-g{background:rgba(255,255,255,.05);color:#8696a0;border:1px solid #2a3942}</style></head><body><div class="card"><div class="ico">&#x2705;</div><h1>Payment Received!</h1><p class="sub">Your plan will be activated within <strong>30 minutes</strong> after verification.</p><div class="detail" id="d"></div><a href="/index.html" class="btn btn-p">Go to Dashboard</a><a href="/pricing.html" class="btn btn-g">View Plans</a></div><script>const P=new URLSearchParams(location.search),ref=P.get("ref")||"-",pname=P.get("name")||"-",amt=P.get("amount")||"0";document.getElementById("d").innerHTML="<div class=dr><span class=dk>Reference</span><span class=dv style=font-family:monospace;color:#53bdeb>"+ref+"</span></div><div class=dr><span class=dk>Plan</span><span class=dv>"+pname+"</span></div><div class=dr><span class=dk>Amount</span><span class=dv>PKR "+Number(amt).toLocaleString()+"</span></div><div class=dr><span class=dk>Status</span><span class=dv style=color:#f59e0b>Pending Verification</span></div>";</script></body></html>
